<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love First Church Others Program</title>
    <meta name="description" content="Register for the upcoming service at Love First Church.">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>

<body>
    <!-- Removed background effects for professional look -->

    <main class="container">
        <div class="glass-panel form-wrapper">
            <div class="header-section">
                <!-- Please place the logo you downloaded in the same directory as this file and name it 'logo.png' -->
                <img src="./logo.png" alt="Love First Church Logo" class="logo" id="church-logo"
                    onerror="this.onerror=null; this.src='https://via.placeholder.com/300x150/111/fff?text=LOVE+FIRST+CHURCH';">
                <h1 class="form-title" style="font-size: 1.6rem;">Love First Church Others Program</h1>
            </div>

            <form id="registration-form" class="registration-form">
                <div class="form-group">
                    <label for="fullName">Full Name <span class="required">*</span></label>
                    <input type="text" id="fullName" name="fullName" placeholder="Enter your full name" required>
                    <div class="focus-border"></div>
                </div>

                <div class="form-group">
                    <label for="phoneNumber">Phone Number <span class="required">*</span></label>
                    <input type="tel" id="phoneNumber" name="phoneNumber"
                        placeholder="e.g. 0501234567 or 0501234567/0551234567" required>
                    <div class="focus-border"></div>
                    <span class="help-text">Use / to add a second number e.g. 0501234567/0551234567</span>
                </div>

                <div class="form-group">
                    <label for="pastorName">Name of Pastor/Shepherd <span class="required">*</span></label>
                    <input type="text" id="pastorName" name="pastorName"
                        placeholder="Enter the name of your pastor or shepherd" required>
                    <div class="focus-border"></div>
                </div>

                <div class="form-group">
                    <label for="location">Location <span class="required">*</span></label>
                    <input type="text" id="location" name="location" placeholder="Enter your location" required>
                    <div class="focus-border"></div>
                    <span class="help-text">Type the location you belong to</span>
                </div>

                <button type="submit" class="submit-btn" id="submit-btn">
                    <span class="btn-text">Submit Registration</span>
                    <div class="btn-loader"></div>
                </button>
            </form>

            <div class="footer-link">
            </div>
        </div>
    </main>

    <div id="success-toast" class="toast hidden">
        <svg viewBox="0 0 24 24" width="24" height="24" class="toast-icon">
            <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z" fill="currentColor" />
        </svg>
        <span>Registration Successful!</span>
    </div>

    <script src="script.js"></script>
</body>

</html>
